<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot · 50 Aniversario IB · TecNM Celaya</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #1a5c2a;
    --verde-claro: #2d8a45;
    --dorado: #c8960c;
    --dorado-claro: #f0b429;
    --crema: #faf7f0;
    --gris: #f0ede6;
    --texto: #1a1a1a;
    --burbuja-bot: #ffffff;
    --burbuja-user: #1a5c2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--crema);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  header {
    width: 100%;
    background: linear-gradient(135deg, var(--verde) 0%, #0f3d1a 60%, #1a5c2a 100%);
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(200,150,12,0.15);
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 30%;
    width: 200px; height: 60px;
    background: rgba(200,150,12,0.08);
    border-radius: 50%;
  }

  .logo-circle {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--dorado);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 900;
    color: white;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(200,150,12,0.4);
    z-index: 1;
  }

  .header-text { z-index: 1; }

  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--dorado-claro);
    letter-spacing: 0.5px;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    margin-top: 2px;
  }

  .badge {
    margin-left: auto;
    background: rgba(200,150,12,0.25);
    border: 1px solid var(--dorado);
    color: var(--dorado-claro);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    z-index: 1;
    white-space: nowrap;
  }

  /* CHAT AREA */
  #chat {
    flex: 1;
    width: 100%;
    max-width: 700px;
    padding: 20px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    min-height: 0;
    max-height: calc(100vh - 260px);
  }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .avatar.bot {
    background: var(--verde);
    color: white;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 14px;
  }

  .avatar.user {
    background: var(--dorado);
    color: white;
    font-size: 16px;
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  .msg.bot .bubble {
    background: var(--burbuja-bot);
    color: var(--texto);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(0,0,0,0.07);
  }

  .msg.user .bubble {
    background: var(--burbuja-user);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .bubble strong { color: var(--verde); }
  .msg.user .bubble strong { color: var(--dorado-claro); }

  .bubble .tag {
    display: inline-block;
    background: var(--gris);
    color: var(--verde);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin: 2px 2px;
    border: 1px solid rgba(0,0,0,0.08);
  }

  /* TYPING */
  .typing span {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--verde-claro);
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* CHIPS */
  #chips {
    width: 100%;
    max-width: 700px;
    padding: 0 16px 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .chip {
    background: white;
    border: 1.5px solid var(--verde);
    color: var(--verde);
    font-size: 12px;
    padding: 6px 13px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .chip:hover {
    background: var(--verde);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(26,92,42,0.25);
  }

  /* INPUT AREA */
  #input-area {
    width: 100%;
    max-width: 700px;
    padding: 10px 16px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    border: 2px solid rgba(26,92,42,0.2);
    border-radius: 24px;
    padding: 12px 18px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    background: white;
    resize: none;
    max-height: 100px;
    overflow-y: auto;
    transition: border-color 0.2s;
    color: var(--texto);
  }

  #user-input:focus { border-color: var(--verde); }
  #user-input::placeholder { color: #aaa; }

  #send-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--verde);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 3px 12px rgba(26,92,42,0.35);
  }

  #send-btn:hover { background: var(--verde-claro); transform: scale(1.05); }
  #send-btn svg { width: 20px; height: 20px; fill: white; }

  /* FOOTER NOTE */
  .footer-note {
    font-size: 10px;
    color: #aaa;
    text-align: center;
    padding-bottom: 6px;
  }

  /* SCROLLBAR */
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: rgba(26,92,42,0.2); border-radius: 4px; }
</style>
</head>
<body>

// =============================================
//  MOTOR DE BÚSQUEDA
// =============================================
function normalize(txt) {
  return txt.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ');
}

function findAnswer(q) {
  const nq = normalize(q);
  let best = null, bestScore = 0;

  for (const item of KB) {
    let score = 0;
    for (const key of item.keys) {
      if (nq.includes(normalize(key))) {
        score += key.split(' ').length; // más largo = más específico
      }
    }
    if (score > bestScore) { bestScore = score; best = item; }
  }

  if (best && bestScore > 0) return best.resp;

  return `Lo siento, no tengo información sobre eso. 🤔<br><br>
Puedo ayudarte con cursos, talleres, eventos deportivos, culturales, souvenirs, costos y registro.<br>
¿Quieres que te explique alguno de esos temas?`;
}

// =============================================
//  INTERFAZ
// =============================================
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('user-input');

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = `msg ${who}`;
  const av = document.createElement('div');
  av.className = `avatar ${who}`;
  av.textContent = who === 'bot' ? 'IB' : '👤';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = text;
  if (who === 'bot') {
    div.appendChild(av);
    div.appendChild(bub);
  } else {
    div.appendChild(bub);
    div.appendChild(av);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar bot">IB</div><div class="bubble typing"><span></span><span></span><span></span></div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function handleSend() {
  const text = inputEl.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMsg(findAnswer(text), 'bot');
  }, 600 + Math.random() * 400);
}

function sendChip(btn) {
  const label = btn.textContent.replace(/^[^\w\s]+\s*/, '').trim();
  inputEl.value = label;
  handleSend();
}

// Enter para enviar (Shift+Enter para nueva línea)
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

// Auto-resize textarea
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Mensaje de bienvenida
setTimeout(() => {
  addMsg(`¡Bienvenido al congreso! 🎓 Soy tu asistente para el <strong>50 Aniversario de Ingeniería Bioquímica</strong> del TecNM Celaya.<br><br>
Estoy aquí para resolver tus dudas sobre cursos, talleres, eventos, costos e inscripciones. ¿Por dónde empezamos?`, 'bot');
}, 400);
</script>
</body>
</html>
