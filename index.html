<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot - 50 Aniversario IB - TecNM Celaya</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde: #1a5c2a;
      --verde-claro: #2d8a45;
      --dorado: #c8960c;
      --dorado-claro: #f0b429;
      --crema: #faf7f0;
      --gris: #f0ede6;
      --texto: #1a1a1a;
      --burbuja-bot: #ffffff;
      --burbuja-user: #1a5c2a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--crema);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: linear-gradient(135deg, var(--verde) 0%, #0f3d1a 60%, #1a5c2a 100%);
      padding: 18px 24px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(200,150,12,0.15);
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 30%;
      width: 200px;
      height: 60px;
      background: rgba(200,150,12,0.08);
      border-radius: 50%;
    }

    .logo-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--dorado);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(200,150,12,0.4);
      z-index: 1;
    }

    .header-text {
      z-index: 1;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      color: var(--dorado-claro);
      letter-spacing: 0.5px;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
    }

    .badge {
      margin-left: auto;
      background: rgba(200,150,12,0.25);
      border: 1px solid var(--dorado);
      color: var(--dorado-claro);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      z-index: 1;
      white-space: nowrap;
    }

    #chat {
      flex: 1;
      width: 100%;
      max-width: 700px;
      padding: 20px 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      min-height: 0;
      max-height: calc(100vh - 260px);
    }

    .msg {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .avatar.bot {
      background: var(--verde);
      color: white;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 14px;
    }

    .avatar.user {
      background: var(--dorado);
      color: white;
      font-size: 16px;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .msg.bot .bubble {
      background: var(--burbuja-bot);
      color: var(--texto);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(0,0,0,0.07);
    }

    .msg.user .bubble {
      background: var(--burbuja-user);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bubble strong {
      color: var(--verde);
    }

    .msg.user .bubble strong {
      color: var(--dorado-claro);
    }

    .bubble .tag {
      display: inline-block;
      background: var(--gris);
      color: var(--verde);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin: 2px 2px;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .typing span {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--verde-claro);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-6px);
      }
    }

    #chips {
      width: 100%;
      max-width: 700px;
      padding: 0 16px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      background: white;
      border: 1.5px solid var(--verde);
      color: var(--verde);
      font-size: 12px;
      padding: 6px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .chip:hover {
      background: var(--verde);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(26,92,42,0.25);
    }

    #input-area {
      width: 100%;
      max-width: 700px;
      padding: 10px 16px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      border: 2px solid rgba(26,92,42,0.2);
      border-radius: 24px;
      padding: 12px 18px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      background: white;
      resize: none;
      max-height: 100px;
      overflow-y: auto;
      transition: border-color 0.2s;
      color: var(--texto);
    }

    #user-input:focus {
      border-color: var(--verde);
    }

    #user-input::placeholder {
      color: #aaa;
    }

    #send-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--verde);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 3px 12px rgba(26,92,42,0.35);
    }

    #send-btn:hover {
      background: var(--verde-claro);
      transform: scale(1.05);
    }

    #send-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .footer-note {
      font-size: 10px;
      color: #aaa;
      text-align: center;
      padding-bottom: 6px;
    }

    #chat::-webkit-scrollbar {
      width: 4px;
    }

    #chat::-webkit-scrollbar-thumb {
      background: rgba(26,92,42,0.2);
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-circle">IB</div>
    <div class="header-text">
      <h1>50 Aniversario - Ingeniería Bioquímica</h1>
      <p>TecNM Celaya - 19 al 23 de octubre de 2026</p>
    </div>
    <span class="badge">En línea</span>
  </header>

  <div id="chat"></div>

  <div id="chips">
    <button class="chip" onclick="sendChip(this)">Cursos matutinos</button>
    <button class="chip" onclick="sendChip(this)">Cursos vespertinos</button>
    <button class="chip" onclick="sendChip(this)">Talleres prácticos</button>
    <button class="chip" onclick="sendChip(this)">Talleres de habilidades blandas</button>
    <button class="chip" onclick="sendChip(this)">Eventos deportivos</button>
    <button class="chip" onclick="sendChip(this)">Eventos culturales</button>
    <button class="chip" onclick="sendChip(this)">Souvenirs</button>
    <button class="chip" onclick="sendChip(this)">Costos y precios</button>
    <button class="chip" onclick="sendChip(this)">Registro e inscripción</button>
    <button class="chip" onclick="sendChip(this)">Inauguración</button>
    <button class="chip" onclick="sendChip(this)">Trabajos libres</button>
  </div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Escribe tu pregunta sobre el congreso..."></textarea>
    <button id="send-btn" onclick="handleSend()" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <p class="footer-note">Sin internet - Sin API - 100% local</p>

 }

<script>
const KB = [
  {
    keys: ['inauguracion','inauguración','ceremonia','apertura','inicio','arranque'],
    resp: `<strong>Ceremonia de inauguración</strong><br><br>
    19 de octubre de 2026<br>
    12:00-13:00<br>
    Centro Cultural`
  },
  {
    keys: ['registro','inscripcion','inscripción','inscribir','inscribirme','form','formulario','link','enlace','google form','forms'],
    resp: `<strong>Registro e inscripciones</strong><br><br>
    Accede al formulario oficial aquí:<br><br>
    <a href="https://forms.gle/bwfAZFvtujNbSKN56" target="_blank" style="color:var(--verde);font-weight:600;word-break:break-all;">https://forms.gle/bwfAZFvtujNbSKN56</a><br><br>
    No pierdas tu lugar. El evento es del <strong>19 al 23 de octubre de 2026</strong>.`
  },
  {
    keys: ['costo','costos','precio','precios','cuanto','cuánto','vale','cuesta','pagar','pago','dinero','tarifa'],
    resp: `<strong>Resumen de costos</strong><br><br>
    <strong>Cursos matutinos</strong><br>
    Estudiantes: $950 | Público: $1,200<br><br>
    <strong>Cursos vespertinos</strong><br>
    Estudiantes: $650 | Público: $900<br><br>
    <strong>Talleres prácticos</strong><br>
    Estudiantes: $1,500 | Público: $1,700<br><br>
    <strong>Talleres de habilidades blandas</strong><br>
    Estudiantes: $800 | Público: $1,000<br><br>
    <strong>Carrera conmemorativa</strong><br>
    Estudiantes: $450 | Público: $550<br><br>
    <strong>Cena mexicana</strong><br>
    Estudiantes: $400 | Público: $550`
  },
  {
    keys: ['hola','buenas','buenos','hey','saludos'],
    resp: `Hola. Bienvenido al asistente oficial del <strong>50 Aniversario de Ingeniería Bioquímica</strong> del TecNM Celaya.<br><br>
    ¿Sobre qué quieres saber?`
  }
];

function normalize(txt) {
  return txt
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function findAnswer(q) {
  const nq = normalize(q);
  let best = null;
  let bestScore = 0;

  for (const item of KB) {
    let score = 0;

    for (const key of item.keys) {
      const normalizedKey = normalize(key);
      if (nq.includes(normalizedKey)) {
        score += normalizedKey.split(' ').length;
      }
    }

    if (score > bestScore) {
      bestScore = score;
      best = item;
    }
  }

  if (best && bestScore > 0) {
    return best.resp;
  }

  return `Lo siento, no tengo información sobre eso.<br><br>
  Puedo ayudarte con inauguración, cursos, talleres, costos y registro.`;
}

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('user-input');

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = `msg ${who}`;

  const av = document.createElement('div');
  av.className = `avatar ${who}`;
  av.textContent = who === 'bot' ? 'IB' : 'U';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = text;

  if (who === 'bot') {
    div.appendChild(av);
    div.appendChild(bub);
  } else {
    div.appendChild(bub);
    div.appendChild(av);
  }

  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="avatar bot">IB</div><div class="bubble typing"><span></span><span></span><span></span></div>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function handleSend() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMsg(text, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';

  showTyping();

  setTimeout(() => {
    removeTyping();
    addMsg(findAnswer(text), 'bot');
  }, 700);
}

function sendChip(btn) {
  const label = btn.textContent.trim();
  inputEl.value = label;
  handleSend();
}

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

setTimeout(() => {
  addMsg(`Bienvenido al congreso. Soy tu asistente para el <strong>50 Aniversario de Ingeniería Bioquímica</strong> del TecNM Celaya.<br><br>
  Estoy aquí para resolver tus dudas sobre inauguración, cursos, talleres, costos e inscripciones.`, 'bot');
}, 400);
</script>
